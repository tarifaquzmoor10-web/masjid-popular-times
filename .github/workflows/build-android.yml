name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/masjid-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/masjid-app build:android
      - run: cd artifacts/masjid-app && npx cap sync android
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x artifacts/masjid-app/android/gradlew
      - run: cd artifacts/masjid-app/android && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: masjid-popular-times-debug
          path: artifacts/masjid-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
