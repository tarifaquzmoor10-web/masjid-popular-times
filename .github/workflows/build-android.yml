name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/masjid-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for Android
        run: pnpm --filter @workspace/masjid-app build:android

      - name: Grant Gradle execute permission
        run: chmod +x artifacts/masjid-app/android/gradlew

      - name: Sync Capacitor
        run: cd artifacts/masjid-app && npx cap sync android

      - name: Build debug APK
        run: |
          cd artifacts/masjid-app/android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: masjid-popular-times-debug
          path: artifacts/masjid-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
